version: '3.8'

services:
  # PostgreSQL для хранения фидов и статей
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-newsdb}
      POSTGRES_USER: ${POSTGRES_USER:-newsuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-newspass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-newsuser}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis для Celery
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Django backend
  web:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: >
      sh -c "cd /app/backend &&
             uv run python manage.py migrate &&
             uv run python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./:/app
    ports:
      - "8000:8000"
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-secret-key}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-True}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      REDIS_URL: redis://redis:6379/0
      USE_PYTHON_PARSER: ${USE_PYTHON_PARSER:-false}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Celery worker
  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: >
      sh -c "cd /app/backend &&
             uv run celery -A config worker --loglevel=info --concurrency=2"
    volumes:
      - ./:/app
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-secret-key}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-True}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      REDIS_URL: redis://redis:6379/0
      USE_PYTHON_PARSER: ${USE_PYTHON_PARSER:-false}
    depends_on:
      - web
      - redis

  # Celery beat
  beat:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: >
      sh -c "cd /app/backend &&
             uv run celery -A config beat --loglevel=info"
    volumes:
      - ./:/app
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-secret-key}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-True}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      REDIS_URL: redis://redis:6379/0
      USE_PYTHON_PARSER: ${USE_PYTHON_PARSER:-false}
    depends_on:
      - web
      - redis

volumes:
  postgres_data:
